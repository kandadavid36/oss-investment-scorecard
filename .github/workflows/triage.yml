name: Triage and Validate Submissions

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  # ── Auto-label Issues ──────────────────────────────────────────────
  label-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Label by title prefix
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title;
            const labels = [];

            if (title.startsWith('[EVAL]'))      labels.push('evaluation');
            if (title.startsWith('[FRAMEWORK]')) labels.push('framework-change');
            if (title.startsWith('[CASE]'))      labels.push('case-study');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels
              });
            }

      - name: Post welcome comment on evaluation submission
        if: contains(github.event.issue.title, '[EVAL]')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Thanks for submitting an evaluation! 🙏

            **What happens next:**
            - Lucy will review within 14 days
            - If the data sources check out, it'll be added to the [Evaluated Projects table](../blob/main/README.md#-evaluated-projects-community-submissions) in the README
            - If you checked the connection intent boxes, Lucy will reach out directly

            In the meantime, feel free to discuss this evaluation in the comments — other community members can weigh in.`
            });

      - name: Post welcome comment on framework change
        if: contains(github.event.issue.title, '[FRAMEWORK]')
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Framework change proposal received 📋

            Per [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md), all framework changes require:
            1. ✅ A funded OSS company as evidence  
            2. ✅ A VC report or public LP letter  
            3. ✅ Explanation of what the current framework gets wrong

            Lucy will review and respond. Community members are encouraged to comment with supporting or counter evidence before a decision is made.`
            });

  # ── Validate PR has required sections ──────────────────────────────
  validate-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check PR touches valid paths only
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            const validPaths = ['cases/', 'SKILL.md', 'README.md',
                                'references/', 'template/', 'CONTRIBUTING.md'];
            const invalid = files
              .map(f => f.filename)
              .filter(f => !validPaths.some(p => f.startsWith(p)));

            if (invalid.length > 0) {
              core.setFailed(
                `PR modifies files outside allowed paths: ${invalid.join(', ')}\n` +
                `Allowed: ${validPaths.join(', ')}`
              );
            } else {
              console.log('✅ All modified files are in valid paths');
            }
